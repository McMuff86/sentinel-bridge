<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sentinel Bridge — Status</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', system-ui, sans-serif; background: #09090b; color: #e4e4e7; min-height: 100vh; padding: 2rem; }
  a { color: #22d3ee; }
  .container { max-width: 1120px; margin: 0 auto; }
  header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
  header h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.02em; }
  header h1 span { color: #22d3ee; }
  .meta { font-size: 0.75rem; color: #71717a; text-align: right; line-height: 1.5; }

  /* Summary bar */
  .summary { display: flex; gap: 1px; background: #27272a; border-radius: 10px; overflow: hidden; margin-bottom: 1.5rem; }
  .summary-item { flex: 1; background: #18181b; padding: 1rem 1.25rem; transition: background 0.3s; }
  .summary-item:hover { background: #1c1c20; }
  .summary-label { font-size: 0.6875rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; color: #71717a; margin-bottom: 0.25rem; }
  .summary-value { font-size: 1.5rem; font-weight: 700; color: #fafafa; }
  .summary-value.accent { color: #22d3ee; }

  /* Engine cards */
  .engines { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 0.75rem; margin-bottom: 1.5rem; }
  .engine-card { background: #18181b; border: 1px solid #27272a; border-radius: 10px; padding: 1rem 1.25rem; transition: border-color 0.3s, opacity 0.4s; }
  .engine-card:hover { border-color: #3f3f46; }
  .engine-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.625rem; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; transition: background 0.4s; }
  .dot-healthy { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }
  .dot-disabled { background: #52525b; }
  .dot-error { background: #ef4444; box-shadow: 0 0 6px #ef444488; }
  .engine-name { font-weight: 600; font-size: 0.875rem; }
  .engine-detail { font-size: 0.75rem; color: #a1a1aa; line-height: 1.6; }
  .engine-detail span { color: #d4d4d8; }

  /* Sessions table */
  .table-wrap { background: #18181b; border: 1px solid #27272a; border-radius: 10px; overflow: hidden; }
  .table-title { font-size: 0.8125rem; font-weight: 600; padding: 0.875rem 1.25rem; border-bottom: 1px solid #27272a; }
  table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
  th { text-align: left; padding: 0.625rem 1.25rem; font-weight: 500; color: #71717a; text-transform: uppercase; letter-spacing: 0.04em; font-size: 0.6875rem; border-bottom: 1px solid #27272a; }
  td { padding: 0.625rem 1.25rem; border-bottom: 1px solid #1e1e22; color: #d4d4d8; transition: background 0.3s; }
  tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: #1c1c20; }
  .badge { display: inline-block; padding: 0.125rem 0.5rem; border-radius: 9999px; font-size: 0.6875rem; font-weight: 500; }
  .badge-active { background: #052e16; color: #4ade80; }
  .badge-idle { background: #1a1a2e; color: #818cf8; }
  .badge-done { background: #1c1917; color: #a1a1aa; }
  .badge-error { background: #2a0a0a; color: #f87171; }
  .empty-row td { text-align: center; color: #52525b; padding: 2rem; }

  /* Fade animation */
  .fade-in { animation: fadeIn 0.4s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  @media (max-width: 640px) {
    body { padding: 1rem; }
    .summary { flex-direction: column; }
    th, td { padding: 0.5rem 0.75rem; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1><span>Sentinel</span> Bridge</h1>
    <div class="meta">Status Dashboard<br><span id="last-updated">—</span></div>
  </header>
  <div class="summary" id="summary"></div>
  <div class="engines" id="engines"></div>
  <div class="table-wrap">
    <div class="table-title">Sessions</div>
    <table>
      <thead><tr>
        <th>Name</th><th>Engine</th><th>Model</th><th>Status</th><th>Phase</th><th>Turns</th><th>Cost</th><th>Last Action</th>
      </tr></thead>
      <tbody id="sessions"></tbody>
    </table>
  </div>
</div>
<script>
(function () {
  const $ = (id) => document.getElementById(id);

  function engineDotClass(e) {
    if (e.healthy) return 'dot-healthy';
    if (e.enabled && !e.healthy) return 'dot-error';
    return 'dot-disabled';
  }

  function badgeClass(s) {
    if (!s) return 'badge-done';
    const l = s.toLowerCase();
    if (l === 'active' || l === 'running') return 'badge-active';
    if (l === 'idle' || l === 'paused') return 'badge-idle';
    if (l === 'error' || l === 'failed') return 'badge-error';
    return 'badge-done';
  }

  function renderSummary(ov) {
    const items = [
      ['Total Sessions', ov.totalSessions ?? 0, ''],
      ['Active', ov.activeSessions ?? 0, 'accent'],
      ['Total Cost', '$' + (ov.totalCostUsd ?? 0).toFixed(4), 'accent']
    ];
    $('summary').innerHTML = items.map(([l, v, c]) =>
      `<div class="summary-item fade-in"><div class="summary-label">${l}</div><div class="summary-value ${c}">${v}</div></div>`
    ).join('');
  }

  function renderEngines(enginesObj) {
    const entries = Object.entries(enginesObj);
    $('engines').innerHTML = entries.map(([key, e]) => {
      const note = e.note ? `<div class="engine-detail"><span style="color:#71717a;font-style:italic">${esc(e.note)}</span></div>` : '';
      return `<div class="engine-card fade-in">
        <div class="engine-header">
          <div class="status-dot ${engineDotClass(e)}"></div>
          <div class="engine-name">${esc(e.id || key)}</div>
        </div>
        <div class="engine-detail">Model: <span>${esc(e.model || '—')}</span></div>
        <div class="engine-detail">Binary: <span>${esc(e.binary || '—')}</span></div>
        ${note}
      </div>`;
    }).join('');
  }

  function renderSessions(sessions) {
    if (!sessions.length) {
      $('sessions').innerHTML = '<tr class="empty-row"><td colspan="8">No sessions</td></tr>';
      return;
    }
    $('sessions').innerHTML = sessions.map(s => `<tr class="fade-in">
      <td>${esc(s.name || '—')}</td><td>${esc(s.engine || '—')}</td><td>${esc(s.model || '—')}</td>
      <td><span class="badge ${badgeClass(s.status)}">${esc(s.status || '—')}</span></td>
      <td>${esc(s.phase || '—')}</td><td>${s.turnCount ?? '—'}</td>
      <td>${s.costUsd != null ? '$' + parseFloat(s.costUsd).toFixed(4) : '—'}</td>
      <td>${esc(s.lastAction || '—')}</td>
    </tr>`).join('');
  }

  function esc(s) { const d = document.createElement('div'); d.textContent = String(s); return d.innerHTML; }

  function render(data) {
    const ov = data.overview || {};
    const sessions = ov.sessions || [];
    const engines = data.engines || {};
    renderSummary(ov);
    renderEngines(engines);
    renderSessions(sessions);
    $('last-updated').textContent = new Date().toLocaleTimeString();
  }

  // Global API
  window.updateDashboard = render;

  // Demo state — matches sb_session_overview shape
  render({
    overview: {
      totalSessions: 4,
      activeSessions: 2,
      stoppedSessions: 1,
      totalCostUsd: 0.1056,
      sessions: [
        { name: 'refactor-auth', engine: 'claude', model: 'claude-sonnet-4-6', status: 'active', phase: 'coding', turnCount: 12, costUsd: 0.0834, lastAction: 'edit src/auth.ts' },
        { name: 'fix-ci-pipeline', engine: 'codex', model: 'gpt-5.4', status: 'active', phase: 'review', turnCount: 5, costUsd: 0.0210, lastAction: 'run tests' },
        { name: 'draft-readme', engine: 'grok', model: 'grok-4-1-fast', status: 'idle', phase: 'waiting', turnCount: 3, costUsd: 0.0012, lastAction: 'generate outline' },
        { name: 'local-embeddings', engine: 'ollama', model: 'llama3.2', status: 'error', phase: 'crashed', turnCount: 1, costUsd: 0, lastAction: 'connection refused' }
      ]
    },
    engines: {
      claude: { id: 'claude', enabled: true, available: true, healthy: true, binary: '/usr/local/bin/claude', model: 'claude-sonnet-4-6' },
      codex: { id: 'codex', enabled: true, available: true, healthy: true, binary: '/usr/local/bin/codex', model: 'gpt-5.4' },
      grok: { id: 'grok', enabled: false, available: false, healthy: false, binary: null, model: 'grok-4-1-fast', note: 'disabled' },
      ollama: { id: 'ollama', enabled: true, available: true, healthy: false, binary: '/usr/local/bin/ollama', model: 'llama3.2', note: 'connection refused' }
    }
  });
})();
</script>
</body>
</html>
